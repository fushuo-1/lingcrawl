use_default_settings: true

search:
  formats:
    - html
    - json
  default_lang: ""
  autocomplete: ""

server:
  bind_address: "0.0.0.0"
  secret_key: "lingcrawl-local-test-key"

outgoing:
  request_timeout: 10
  max_request_timeout: 15

engines:
  # ===== 国内通用搜索 =====
  - name: baidu
    disabled: false
  - name: sogou
    disabled: false
  - name: 360search
    disabled: false
  - name: quark
    disabled: false

  # ===== 国际通用搜索 =====
  - name: bing
    disabled: false
  - name: google
    disabled: false
  - name: duckduckgo
    disabled: false
  - name: brave
    disabled: false

  # ===== 国内垂直搜索 =====
  - name: baidu images
    disabled: true
  - name: sogou images
    disabled: true
  - name: sogou wechat
    disabled: false
  - name: bilibili
    disabled: false
  - name: baidu kaifa
    disabled: false

  # ===== 国际垂直搜索 =====
  - name: bing news
    disabled: true
  - name: bing images
    disabled: true
  - name: google news
    disabled: true
  - name: google scholar
    disabled: true
