use_default_settings: true

search:
  formats:
    - html
    - json
  default_lang: "auto"
  autocomplete: ""

server:
  bind_address: "0.0.0.0"
  secret_key: "lingcrawl-local-test-key"

outgoing:
  request_timeout: 10
  max_request_timeout: 15

engines:
  # ===== 国内通用搜索（高权重） =====
  - name: baidu
    disabled: false
    weight: 2.0
  - name: sogou
    disabled: false
    weight: 1.5
  - name: 360search
    disabled: false
    weight: 1.5
  - name: quark
    disabled: false
    weight: 1.2

  # ===== 国际通用搜索（中权重，补充英文覆盖） =====
  - name: bing
    disabled: false
    weight: 1.2
  - name: google
    disabled: false
    weight: 1.0
  - name: duckduckgo
    disabled: false
    weight: 0.8
  - name: brave
    disabled: false
    weight: 0.8

  # ===== 国内垂直搜索 =====
  - name: baidu images
    disabled: false
  - name: sogou images
    disabled: false
  - name: sogou wechat
    disabled: false
  - name: bilibili
    disabled: false
  - name: baidu kaifa
    disabled: false

  # ===== 国际垂直搜索 =====
  - name: bing news
    disabled: false
  - name: bing images
    disabled: false
  - name: google news
    disabled: false
  - name: google scholar
    disabled: false
